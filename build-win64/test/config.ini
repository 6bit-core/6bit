# These environment variables are set by the build process and read by
# test/*/test_runner.py

[environment]
CLIENT_NAME=Sixbit
CLIENT_BUGREPORT=https://github.com/6bit-core/6bit/issues
SRCDIR=/home/ubuntu/6bit
BUILDDIR=/home/ubuntu/6bit/build-win64
EXEEXT=.exe
RPCAUTH=/home/ubuntu/6bit/share/rpcauth/rpcauth.py

[components]
# Which components are enabled. These are commented out by cmake if they were disabled during configuration.
ENABLE_WALLET=true
ENABLE_CLI=true
BUILD_sixbit_TX=true
ENABLE_sixbit_UTIL=true
#ENABLE_sixbit_CHAINSTATE=true
ENABLE_WALLET_TOOL=true
ENABLE_6BITD=true
#ENABLE_FUZZ_BINARY=true
ENABLE_ZMQ=true
ENABLE_EXTERNAL_SIGNER=true
#ENABLE_USDT_TRACEPOINTS=true
#ENABLE_IPC=true
