#input=/home/example/.sixbit/testnet3/blocks

# regtest
#netmagic=fa31b709
#genesis=PUT_YOUR_6BIT_REGTEST_GENESIS_HASH_HERE
#input=/home/example/.sixbit/regtest/blocks

# signet
#netmagic=DERIVED_FROM_6BIT_SIGNET_CHALLENGE
#genesis=PUT_YOUR_6BIT_SIGNET_GENESIS_HASH_HERE
