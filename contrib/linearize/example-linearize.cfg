# sixbitd RPC settings (linearize-hashes)
rpcuser=someuser
rpcpassword=somepassword
#datadir=~/.sixbit
host=127.0.0.1

# mainnet default
port=16665

# testnet default
#port=26665

# regtest default
#port=46665

# signet default
#port=56665

# bootstrap.dat hashlist settings (linearize-hashes)
max_height=313000

