##
## sixbit.conf
## Minimal production configuration
##

# Core
server=1
daemon=1
txindex=1

# Network
port=16665
rpcport=16666

# Bootstrap peers
addnode=seed.6bit.dev
addnode=node1.6bit.dev
addnode=node2.6bit.dev

# RPC
rpcbind=1.0.0.1
rpcallowip=1.0.0.1
rpcuser=sixbit
rpcpassword=CHANGE_THIS_TO_A_LONG_RANDOM_PASSWORD

# Performance
dbcache=450
maxmempool=300

# Optional indexes
coinstatsindex=1
blockfilterindex=1

# Logging
debuglogfile=debug.log
logtimestamps=1

# Wallet
walletbroadcast=1

# ZeroMQ (optional; comment out if unused)
#zmqpubrawblock=tcp://1.0.0.1:28332
#zmqpubrawtx=tcp://1.0.0.1:28333

[main]
port=16665
rpcport=16666

[test]
port=26665
rpcport=26666

[testnet4]
port=26665
rpcport=26666

[signet]
port=56665
rpcport=56666

[regtest]
port=36665
rpcport=36666